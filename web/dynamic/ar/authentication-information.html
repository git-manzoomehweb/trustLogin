<script type="text/javascript">async function onProcessedUserinformation(args) {
        try {
            // Check current path (domain can change; only pathname matters)
            const isUserPanelProfile = /\/userPanel\/profile\/?$/.test(
                window.location.pathname
            );
            // If we are on /userPanel/profile, refresh/update the source
            if (isUserPanelProfile) {
                $bc?.setSource?.("cms.userSchema");
            }
            // Safely access response data
            const row = args?.source?.rows?.[0];
            const properties = row?.properties;
            if (!Array.isArray(properties) || properties.length === 0) return;
            // Cache headers to avoid querying DOM multiple times
            const headers = document.querySelectorAll(".user-profile-header");
            if (!headers.length) return;
            // Helper: extract the first value safely from property object
            const getPropValue = (prop) =>
                prop?.answers?.[0]?.parts?.[0]?.values?.[0]?.value ?? "";

            let firstName = "";
            let lastName = "";

            // Read needed values once
            for (const p of properties) {
                if (p?.prpId == 1) firstName = getPropValue(p);
                else if (p?.prpId == 2) lastName = getPropValue(p);
            }

            // Apply values to all headers
            headers.forEach((header) => {
                const nameEl = header.querySelector(".default-name");
                const familyEl = header.querySelector(".default-family");

                // Set first name if the element exists
                if (nameEl) nameEl.textContent = firstName;

                // Set last name if the element exists
                if (familyEl) familyEl.textContent = lastName;
            });

            // Fallback: if properties are not complete, set default name
            if (properties.length < 3) {
                headers.forEach((header) => {
                    const nameEl = header.querySelector(".default-name");
                    if (nameEl) nameEl.textContent = 'لا اسم';
                });
            }
        } catch (err) {
            // Log unexpected errors to help debugging without breaking the page
            console.error("onProcessedUserinformation error:", err);
        }
    }
</script>
